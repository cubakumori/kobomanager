<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/km_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoboManager</title>
    <!-- Modo oscuro sin destello: aplica la clase ANTES de cargar la app
         (misma lógica que src/composables/darkMode.js: elección del usuario →
         default del sitio cacheado de /config → 'auto').
         OJO: el hash de este <script> está fijado en la CSP (public/.htaccess y
         DEPLOY §6). Si cambias el contenido, recalcula el hash o el modo oscuro
         romperá la CSP en producción. -->
    <script>
      try {
        var kmTheme = localStorage.getItem('km.theme') || localStorage.getItem('km.theme.default') || 'auto'
        if (kmTheme === 'dark' || (kmTheme === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
